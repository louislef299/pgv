---
name: Publish Ollama Model
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ishi

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
    - uses: actions/checkout@v6

    - name: Install ORAS
      uses: oras-project/setup-oras@v1

    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push model to GHCR
      run: |
        oras push "$REGISTRY/$IMAGE_NAME:latest" \
          --artifact-type application/vnd.ollama.model \
          Modelfile
